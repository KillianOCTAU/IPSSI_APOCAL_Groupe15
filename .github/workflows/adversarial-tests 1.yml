# Perturbation J3 - tests adversariaux LLM (prompt injection)

name: Adversarial LLM Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  adversarial-injection:
    name: Prompt injection (pytest)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    env:
      DJANGO_DEBUG: 'False'
      DJANGO_SECRET_KEY: 'ci-only-not-secret'
      DJANGO_ALLOWED_HOSTS: '*'
      POSTGRES_DB: apocal
      POSTGRES_USER: apocal
      POSTGRES_PASSWORD: apocal-ci
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      LLM_BACKEND: mock

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: apocal
          POSTGRES_USER: apocal
          POSTGRES_PASSWORD: apocal-ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U apocal"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Run adversarial tests
        run: pytest llm/tests/test_adversarial.py -v

      - name: Smoke test injection claire
        run: pytest llm/tests/test_adversarial.py -k "injection_claire_rejetee" -v
